<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Rafting Trips - Contact Us site</title>
    <meta name="description"
      content="This page provides a space for users to contact us and send us a message. This is key for us to help for users.">
    <meta name="author" content="Paulo Andreé Monroy Cotrina">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <header>
        <img src="images/logo.jpg" alt="Web Site Logo" width="200">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <h1>Super Rafting Trips</h1>
        <p>123 Main River Street</p>
        <p>Kolob, California</p>
        <p>+1 999 999 9999</p>
        <p>info@whitewater.com</p>

        <form action="box">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d4328.130356708756!2d-77.15064120249136!3d-12.056932468504439!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1ses-419!2spe!4v1775781462029!5m2!1ses-419!2spe"
                  width="450" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <fieldset>

                <div class="form-item column1">
                    <label for="Name">Name</label>
                    <input type="text" id="Name" name="Name" placeholder="Type here your name">
                </div>

                <div class="form-item column1">
                    <label for="Email">Email</label>
                    <input type="email" id="Email" name="Email"
                      placeholder="Type here your email address">
                </div>

                <div class="form-item-radio">

                    <p>Message Purpose</p>

                    <div class="radio-options">
                        <div>
                            <input type="radio" id="choice1" name="Contact">
                            <label for="choice1">General Inquiry</label>
                        </div>

                        <div>
                            <input type="radio" id="choice2" name="Contact">
                            <label for="choice2">Reservation Question</label>
                        </div>

                        <div>
                            <input type="radio" id="choice3" name="Contact">
                            <label for="choice3">Website Suggestion</label>
                        </div>
                    </div>
                </div>

                <div class="form-item">
                    <label for="Message">Message</label>
                    <textarea id="Message" name="Message" rows="4"
                      placeholder="Type here"></textarea>
                </div>

                <div class="form-item column1">
                    <input type="checkbox" id="Suscribe" name="Suscribe">
                    <label for="Suscribe">Please subscribe me to the monthly newsletter</label>
                </div>

                <button type="submit">Get in Touch!</button>

            </fieldset>
        </form>

        <section class="We-Are-Here">
            <h2>We Are Here To Serve You</h2>
            <div class="We-Are-Here-content">
                <figure class="figure-1">
                    <img src="images/employee_one.jpg" alt="Protective helmets">
                    <figcaption>Client Advisor</figcaption>
                </figure>
                <figure class="figure-2">
                    <img src="images/employee_two.jpg" alt="rafting fun">
                    <figcaption>Help Desk Technician </figcaption>
                </figure>
                <figure class="figure-3">
                    <img src="images/employee_three.jpg" alt="rafting rafts">
                    <figcaption>Customer Care </figcaption>
                </figure>

            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 🌊Super Rafting Trips🌊Paulo Andreé Monroy Cotrina</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook_logo.jpg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin_logo.jpg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram_logo.jpg" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
